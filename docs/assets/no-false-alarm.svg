<svg viewBox="0 0 880 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="정상 판정 데모: 일반 배송 완료 문자를 스캔한 뒤 초록불과 함께 '위험도 낮음'을 차분하게 안내하는 애니메이션. 정상 문장 187개 과잉경고 0건.">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10162a"/>
      <stop offset="1" stop-color="#151c33"/>
    </linearGradient>
    <linearGradient id="scan3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4da3ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4da3ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4da3ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 카드 배경 -->
  <rect x="1" y="1" width="878" height="248" rx="18" fill="url(#bg3)" stroke="#2c3654" stroke-width="2"/>

  <g font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
    <g transform="translate(0 -14)">

    <!-- ── 왼쪽: 평범한 문자 ── -->
    <text x="40" y="46" font-size="13" fill="#8b98b8">📩 쇼핑몰에서 온 문자</text>
    <rect x="36" y="58" width="308" height="110" rx="14" fill="#222b44" stroke="#33405f"/>

    <g font-size="15" fill="#dbe2f0">
      <text x="54" y="94">고객님 상품이 배송 완료되었습니다.
        <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
          values="0;0;1;1;0" keyTimes="0;0.03;0.07;0.95;1"/>
      </text>
      <text x="54" y="124">자세한 내용은 공식 앱에서 확인하세요.
        <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
          values="0;0;1;1;0" keyTimes="0;0.09;0.13;0.95;1"/>
      </text>
    </g>

    <!-- 스캔 라인 -->
    <rect x="38" y="60" width="304" height="26" rx="8" fill="url(#scan3)" opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;0.9;0.9;0;0" keyTimes="0;0.2;0.22;0.36;0.4;1"/>
      <animate attributeName="y" dur="8s" repeatCount="indefinite"
        values="60;60;138;60" keyTimes="0;0.2;0.38;1"/>
    </rect>
    <text x="40" y="196" font-size="13" fill="#4da3ff" opacity="0">위험 신호 7종 스캔 중…
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;1;1;0;0" keyTimes="0;0.2;0.22;0.38;0.42;1"/>
    </text>
    <text x="40" y="196" font-size="13" fill="#59dd9a" opacity="0">✓ 뚜렷한 위험 신호 없음
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;1;1;0" keyTimes="0;0.44;0.48;0.94;1"/>
    </text>
    <text x="40" y="222" font-size="12.5" fill="#8b98b8" opacity="0">과한 경고 없이, 한두 줄로 차분하게 안내합니다
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;1;1;0" keyTimes="0;0.5;0.54;0.94;1"/>
    </text>

    <!-- ── 가운데: 신호등 ── -->
    <rect x="392" y="40" width="66" height="180" rx="16" fill="#1b2238" stroke="#33405f" stroke-width="2"/>
    <!-- 초록: 스캔 후 점등(맥동 없이 차분하게) -->
    <circle cx="425" cy="72" r="24" fill="#37d67a" opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;0.3;0.3;0" keyTimes="0;0.42;0.46;0.94;1"/>
    </circle>
    <circle cx="425" cy="72" r="15" fill="#37d67a" opacity="0.16">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0.16;0.16;1;1;0.16" keyTimes="0;0.42;0.46;0.94;1"/>
    </circle>
    <!-- 노랑/주황/빨강: 스캔 중 짧게 깜빡이고 꺼짐 -->
    <circle cx="425" cy="114" r="15" fill="#ffd43b" opacity="0.16">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0.16;0.16;0.7;0.16;0.16" keyTimes="0;0.22;0.26;0.3;1"/>
    </circle>
    <circle cx="425" cy="156" r="15" fill="#ff9838" opacity="0.16">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0.16;0.16;0.7;0.16;0.16" keyTimes="0;0.28;0.32;0.36;1"/>
    </circle>
    <circle cx="425" cy="198" r="15" fill="#ff4d5e" opacity="0.16">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0.16;0.16;0.7;0.16;0.16" keyTimes="0;0.34;0.38;0.42;1"/>
    </circle>

    <!-- ── 오른쪽: 차분한 결과 ── -->
    <text x="500" y="82" font-size="30" font-weight="700" fill="#f4f7ff">뚜렷한 신호만 봅니다</text>
    <text x="500" y="106" font-size="14" fill="#8b98b8">위험할 때만 단호하게 — 정상 문자는 차분하게</text>

    <g opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;1;1;0" keyTimes="0;0.46;0.5;0.94;1"/>
      <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite"
        values="0 10;0 10;0 0;0 0;0 10" keyTimes="0;0.46;0.5;0.94;1"/>
      <rect x="500" y="126" width="196" height="40" rx="20" fill="#12301f" stroke="#37d67a" stroke-width="1.5"/>
      <text x="519" y="152" font-size="17" font-weight="700" fill="#59dd9a">🟢 위험도: 낮음</text>
    </g>

    <g opacity="0" font-size="12.5" fill="#c7d0e8">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        values="0;0;1;1;0" keyTimes="0;0.53;0.57;0.94;1"/>
      <text x="500" y="192">"현재 입력에서는 송금·앱 설치·인증번호 요구·의심 링크 같은</text>
      <text x="500" y="212">뚜렷한 위험 신호가 확인되지 않았습니다." — 실제 응답 중에서</text>
    </g>
    </g>

    <!-- 하단 캡션 (고정) -->
    <text x="440" y="240" font-size="13" fill="#8b98b8" text-anchor="middle">정상 문장 187개 · 과잉경고 0건 (0/187) — 매 커밋 CI가 강제하는 회귀 불변식</text>
  </g>
</svg>
